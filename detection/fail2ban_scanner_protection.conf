# Fail2ban Filter Configuration for detecting automated scanner attempts
# Save this file as /etc/fail2ban/filter.d/ghost-engine-detect.conf

[Definition]
# Regex patterns targeting signature paths checked by vulnerability scanners (e.g. .env, .git, config backups)
failregex = ^<HOST> - - \[.*\] "GET /(.*\.env.*|.*\.git/.*|.*\.sql|.*\.zip|.*\.tar.*|wp-config\.php|actuator/.*|swagger.*) HTTP/.*" (404|403|500)
ignoreregex =

# Example usage in /etc/fail2ban/jail.local:
# [ghost-engine-detect]
# enabled  = true
# port     = http,https
# filter   = ghost-engine-detect
# logpath  = /var/log/nginx/access.log
# maxretry = 3
# findtime = 60
# bantime  = 3600
