# ModSecurity WAF Rules to block automated vulnerability scanning tools
# Integrate these rules into your Web Application Firewall pipeline.

# Rule 1: Block requests from common automated user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nuclei|nikto|dirbuster|ffuf|ghostengine)" \
    "id:1000001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Automated Recon/Scanner Tool Blocked'"

# Rule 2: Block attempts to retrieve sensitive config extensions
SecRule REQUEST_URI "@rx (?i)\.(env|git|bak|sql|zip|tar\.gz)$" \
    "id:1000002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Sensitive Configuration Directory Traversal Blocked'"

# Rule 3: Block access to cloud metadata endpoints (SSRF mitigation)
SecRule REQUEST_URI "@rx /latest/meta-data/" \
    "id:1000003,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Cloud Metadata SSRF Attempt Blocked'"
